name: Scraping Chileautos

on:
  schedule:
    # Aproximadamente mañana y noche en Chile.
    # 00:00 UTC ~= 20:00 CLT / 21:00 CLST
    # 12:00 UTC ~= 08:00 CLT / 09:00 CLST
    - cron: "0 0,12 * * *"
  workflow_dispatch:
    inputs:
      max_listings:
        description: "Cantidad máxima de avisos a procesar en esta corrida"
        required: false
        default: "1500"
      delay_seconds:
        description: "Pausa entre avisos. Subir si aparecen 403/429"
        required: false
        default: "0.5"
      timeout_seconds:
        description: "Timeout por aviso"
        required: false
        default: "10"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        env:
          MAX_LISTINGS: ${{ github.event.inputs.max_listings || '1500' }}
          DELAY_SECONDS: ${{ github.event.inputs.delay_seconds || '0.5' }}
          TIMEOUT_SECONDS: ${{ github.event.inputs.timeout_seconds || '10' }}
        run: |
          echo "Running scraper with max_listings=${MAX_LISTINGS}, delay=${DELAY_SECONDS}, timeout=${TIMEOUT_SECONDS}"
          python -m scraper.run --max-listings "${MAX_LISTINGS}" --delay "${DELAY_SECONDS}" --timeout "${TIMEOUT_SECONDS}"

      - name: Show generated files
        run: |
          echo "Data directory:"
          ls -lah data || true
          echo "Exports directory:"
          ls -lah exports || true

      - name: Commit data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/ exports/
          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "Update Chileautos listings"
            git push
          fi
