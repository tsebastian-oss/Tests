name: Scraping Chileautos

on:
  schedule:
    # Aproximadamente mañana y noche en Chile.
    # 00:00 UTC ~= 20:00 CLT / 21:00 CLST
    # 12:00 UTC ~= 08:00 CLT / 09:00 CLST
    - cron: "0 0,12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        run: |
          python -m scraper.run --max-listings 100 --delay 2.0

      - name: Commit data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/autos.db exports/chileautos_listings_latest.csv exports/chileautos_listings_latest.xlsx
          git diff --cached --quiet || git commit -m "Update Chileautos listings"
          git push
